name: Deploy VCARS_API PROD to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy_prod:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API+DB PROD via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 1200s
          command_timeout: 120m
          script: |
            set -euo pipefail
            LOCKFILE=/tmp/vcars_api_prod_deploy.lock
            flock -w 5400 "$LOCKFILE" bash -s <<'INNER'
            set -euo pipefail
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            SRC=/root/.openclaw/workspace/VCARS_API_SRC
            cd "$SRC"
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main

            test -f .env.prod || cp .env.prod.example .env.prod

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose -f docker-compose.prod.yml ps
            curl -fsSIL --max-time 20 http://127.0.0.1:4010/healthz || true
            INNER
