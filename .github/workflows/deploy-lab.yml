name: Deploy VCARS_API LAB to VPS

on:
  push:
    branches: [ "lab" ]
  workflow_dispatch:

jobs:
  deploy_lab:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API+DB LAB via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 1200s
          command_timeout: 120m
          script: |
            set -euo pipefail
            LOCKFILE=/tmp/vcars_api_lab_deploy.lock
            flock -w 5400 "$LOCKFILE" bash -s <<'INNER'
            set -euo pipefail
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            SRC=/root/.openclaw/workspace/VCARS_API_SRC
            cd "$SRC"
            git fetch --prune origin
            git checkout lab
            git reset --hard origin/lab

            test -f .env.lab || cp .env.lab.example .env.lab

            docker compose -p vcars_api_lab -f docker-compose.lab.yml up -d --build
            docker compose -p vcars_api_lab -f docker-compose.lab.yml ps
            curl -fsSIL --max-time 20 http://127.0.0.1:4000/healthz || true
            INNER
