services:
  db_prod:
    image: postgres:16-alpine
    container_name: vcars-db-prod
    environment:
      POSTGRES_DB: vcars_prod
      POSTGRES_USER: vcars
      POSTGRES_PASSWORD: vcars
    volumes:
      - vcars_pg_prod:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped

  api_prod:
    image: node:22-alpine
    container_name: vcars-api-prod
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env.prod
    command: sh -lc "npm install && npm run prisma:generate && npm run prisma:deploy && npm run build && npm run start"
    ports:
      - "0.0.0.0:4010:4000"
    depends_on:
      - db_prod
    restart: unless-stopped

volumes:
  vcars_pg_prod:
